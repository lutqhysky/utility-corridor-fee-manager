services:
  corridor-fee-manager:
    build: .
    container_name: corridor-fee-manager
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
