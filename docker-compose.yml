services:
  corridor-fee-manager:
    build: .
    container_name: corridor-fee-manager
    ports:
      - "8000:8000"
    environment:
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
      APP_ADMIN_PASSWORD_HASH: ${APP_ADMIN_PASSWORD_HASH:-}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-please-change-this-session-secret}
      APP_SESSION_HTTPS_ONLY: ${APP_SESSION_HTTPS_ONLY:-false}

      FEE_REMINDER_DINGTALK_WEBHOOK: ${FEE_REMINDER_DINGTALK_WEBHOOK:-}
      FEE_REMINDER_WECOM_WEBHOOK: ${FEE_REMINDER_WECOM_WEBHOOK:-}
      FEE_REMINDER_CHANNEL: ${FEE_REMINDER_CHANNEL:-}
      FEE_REMINDER_WEBHOOK: ${FEE_REMINDER_WEBHOOK:-}
      FEE_REMINDER_DAYS_AHEAD: ${FEE_REMINDER_DAYS_AHEAD:-30}
      FEE_REMINDER_CHECK_INTERVAL_SECONDS: ${FEE_REMINDER_CHECK_INTERVAL_SECONDS:-3600}
      FEE_REMINDER_REPEAT_DAYS: ${FEE_REMINDER_REPEAT_DAYS:-2}

    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
