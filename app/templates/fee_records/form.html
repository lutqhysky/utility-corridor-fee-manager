{% extends 'base.html' %}
{% block content %}
<section class="panel form-panel">
    <form method="post" class="form-grid">
        <label>所属单位
            <select name="company_id" required>
                {% for company in companies %}
                <option value="{{ company.id }}">{{ company.short_name or company.company_name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>关联入廊记录
            <select name="pipeline_entry_id">
                <option value="">不关联</option>
                {% for entry in pipeline_entries %}
                <option value="{{ entry.id }}">{{ entry.company.short_name or entry.company.company_name }} - {{ entry.project_name or '未命名项目' }}</option>
                {% endfor %}
            </select>
        </label>
        <label>收费类型
            <select name="fee_type"><option>入廊费</option><option>运维费</option></select>
        </label>
        <label>收费期间<input name="charge_period"></label>
        <label>年度<input name="period_year" type="number"></label>
        <label>季度<input name="period_quarter" type="number" min="1" max="4"></label>
        <label>不含税金额<input name="amount_excl_tax" type="number" step="0.01"></label>
        <label>税率（如0.09）<input name="tax_rate" type="number" step="0.01"></label>
        <label>应收时间<input name="planned_receivable_date" type="date"></label>
        <label>提醒时间<input name="remind_date" type="date"></label>
        <label>最迟付款时间<input name="latest_payment_date" type="date"></label>
        <label>实收金额<input name="actual_received_amount" type="number" step="0.01"></label>
        <label>实收时间<input name="actual_received_date" type="date"></label>
        <label>收缴状态
            <select name="payment_status">
                {% for status in statuses %}<option value="{{ status }}">{{ status }}</option>{% endfor %}
            </select>
        </label>
        <label>是否开票<input name="is_invoiced" value="否"></label>
        <label class="full">备注<textarea name="remark" rows="4"></textarea></label>
        <div class="full"><button type="submit">保存</button></div>
    </form>
</section>
{% endblock %}
