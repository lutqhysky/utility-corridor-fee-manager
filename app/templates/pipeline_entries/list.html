<thead>
    <tr>
        <th>单位</th>
        <th>项目名称</th>
        <th>舱室</th>
        <th>管线类型</th>
        <th>入廊时间</th>
    </tr>
</thead>
<tbody>
{% for entry in entries %}
    <tr>
        <td>{{ entry.company.short_name or entry.company.company_name }}</td>
        <td>
            <a href="/pipeline-entries/{{ entry.id }}">
                {{ entry.project_name or '' }}
            </a>
        </td>
        <td>{{ entry.cabin_type or '' }}</td>
        <td>{{ entry.pipeline_type or '' }}</td>
        <td>{{ entry.entry_date or '' }}</td>
    </tr>
{% endfor %}
</tbody>
