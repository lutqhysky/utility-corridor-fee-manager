<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or '综合管廊有偿使用费管理系统' }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="layout" id="app-layout">
    <aside class="sidebar" id="sidebar">
        <h1 id="sidebar-toggle" title="连续点击可收起/展开侧边栏">管廊收费系统</h1>
        <nav>
            <a href="/">首页概览</a>
            <a href="/companies/">单位管理</a>
            <a href="/pipeline-entries/">入廊管线清单</a>
            <a href="/fee-records/">收费记录</a>
            <a href="/contracts/">合同备案</a>
            <a href="/fee-summary/">收费汇总</a>
            <a href="/feasibility-subsidy/">可行性缺口补助</a>
        </nav>
    </aside>
    <main class="content">
        <header class="page-header">
            <div class="page-header-bar">
                <h2>{{ title }}</h2>
                {% if request.state.user %}
                <div class="page-header-actions">
                    <span class="user-badge">已登录：{{ request.state.user }}</span>
                </div>
                {% endif %}
            </div>
        </header>
        {% block content %}{% endblock %}
    </main>
</div>
<script>
(function () {
    const layout = document.getElementById('app-layout');
    const sidebar = document.getElementById('sidebar');
    const toggle = document.getElementById('sidebar-toggle');
    const storageKey = 'sidebar-collapsed';

    if (!layout || !sidebar || !toggle) {
        return;
    }

    const applyState = (collapsed) => {
        layout.classList.toggle('sidebar-collapsed', collapsed);
        sidebar.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    };

    applyState(window.localStorage.getItem(storageKey) === 'true');

    const toggleSidebar = () => {
        const collapsed = !layout.classList.contains('sidebar-collapsed');
        applyState(collapsed);
        window.localStorage.setItem(storageKey, String(collapsed));
    };

    toggle.addEventListener('click', (event) => {
        event.stopPropagation();
        toggleSidebar();
    });

    sidebar.addEventListener('click', () => {
        if (layout.classList.contains('sidebar-collapsed')) {
            toggleSidebar();
        }
    });
})();
</script>
</body>
</html>
