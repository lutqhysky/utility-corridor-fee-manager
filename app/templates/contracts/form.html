{% extends 'base.html' %}
{% block content %}
<section class="panel form-panel">
    <form method="post" action="{% if contract %}/contracts/{{ contract.id }}/edit{% else %}/contracts/new{% endif %}" class="form-grid">
        <label>所属单位
            <select name="company_id" required>
                {% for company in companies %}
                <option value="{{ company.id }}" {% if contract and contract.company_id == company.id %}selected{% endif %}>{{ company.short_name or company.company_name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>合同类型<input name="contract_type" value="{{ contract.contract_type if contract else '' }}"></label>
        <label>合同名称<input name="contract_name" value="{{ contract.contract_name if contract else '' }}" required></label>
        <label>备案部门<input name="filing_department" value="{{ contract.filing_department if contract else '' }}"></label>
        <label>备案状态<input name="filing_status" value="{{ contract.filing_status if contract else '' }}"></label>
        <label>签订时间<input name="sign_date" type="date" value="{{ contract.sign_date if contract and contract.sign_date else '' }}"></label>
        <label class="full">附件路径<input name="file_path" value="{{ contract.file_path if contract else '' }}"></label>
        <label class="full">备注<textarea name="remark" rows="4">{{ contract.remark if contract else '' }}</textarea></label>
        <div class="full">
            <button type="submit">保存</button>
            <a class="button secondary" href="/contracts/">取消</a>
        </div>
    </form>
</section>
{% endblock %}
